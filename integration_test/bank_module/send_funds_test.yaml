- name: Test sending funds
  inputs:
    # Create test account
    - cmd: seid keys add --keyring-backend test bank-test
    - cmd: printf "12345678\n" | seid keys show -a admin
      env: ADMIN_ACC
    - cmd: seid keys show -a bank-test --keyring-backend test
      env: BANK_TEST_ACC
    - cmd: seid status | jq -r ".SyncInfo.latest_block_height"
      env: BEGINNING_BLOCK_HEIGHT
    - cmd: seid q bank balances $ADMIN_ACC --denom usei --output json | jq -r .amount
      env: BEGINNING_ADMIN_BALANCE
    # Snapshot admin sequence before each send. The sequence advances
    # atomically with tx inclusion, so polling for that advance is a
    # state-only "tx committed" signal — the cosmos KV indexer that
    # -b block polls isn't populated under Autobahn.
    - cmd: seid q account $ADMIN_ACC --output json | jq -r ".sequence // 0"
      env: SEQ_BEFORE_1
    - cmd: printf "12345678\n" | seid tx bank send $ADMIN_ACC $BANK_TEST_ACC 1sei -b sync --fees 2000usei --chain-id sei -y --output json | jq -r ".txhash"
      env: TX_HASH_1
    # Wait for the admin sequence to advance, then echo the current
    # height — a block by which the first send has committed.
    - cmd: deadline=$(($(date +%s)+30)); while [ $(date +%s) -lt $deadline ]; do s=$(seid q account $ADMIN_ACC --output json 2>/dev/null | jq -r ".sequence // 0"); if [ "$s" -gt "$SEQ_BEFORE_1" ]; then seid status | jq -r ".SyncInfo.latest_block_height"; exit 0; fi; sleep 0.5; done; echo "tx1 $TX_HASH_1 not committed within 30s" >&2; exit 1
      env: HEIGHT_AFTER_TX_1
    # Wait for chain to advance past HEIGHT_AFTER_TX_1 so the second
    # send lands in a strictly later block; the historical-balance
    # verifiers depend on the two sends being in distinct blocks.
    - cmd: deadline=$(($(date +%s)+30)); while [ $(date +%s) -lt $deadline ]; do h=$(seid status | jq -r ".SyncInfo.latest_block_height"); if [ "$h" -gt "$HEIGHT_AFTER_TX_1" ]; then exit 0; fi; sleep 0.5; done; echo "chain did not advance past $HEIGHT_AFTER_TX_1 within 30s" >&2; exit 1
    - cmd: seid q account $ADMIN_ACC --output json | jq -r ".sequence // 0"
      env: SEQ_BEFORE_2
    # Send more funds
    - cmd: printf "12345678\n" | seid tx bank send $ADMIN_ACC $BANK_TEST_ACC 1sei -b sync --fees 2000usei --chain-id sei -y --output json | jq -r ".txhash"
      env: TX_HASH_2
    - cmd: deadline=$(($(date +%s)+30)); while [ $(date +%s) -lt $deadline ]; do s=$(seid q account $ADMIN_ACC --output json 2>/dev/null | jq -r ".sequence // 0"); if [ "$s" -gt "$SEQ_BEFORE_2" ]; then seid status | jq -r ".SyncInfo.latest_block_height"; exit 0; fi; sleep 0.5; done; echo "tx2 $TX_HASH_2 not committed within 30s" >&2; exit 1
      env: HEIGHT_AFTER_TX_2
    # Get bank balance at first height
    - cmd: seid q bank balances $BANK_TEST_ACC --denom usei --height $HEIGHT_AFTER_TX_1 --output json | jq -r .amount
      env: FIRST_HISTORICAL_BANK_BAL
    # Get bank balance at second height
    - cmd: seid q bank balances $BANK_TEST_ACC --denom usei --height $HEIGHT_AFTER_TX_2 --output json | jq -r .amount
      env: SECOND_HISTORICAL_BANK_BAL
    # Get bank balance for latest height
    - cmd: seid q bank balances $BANK_TEST_ACC --denom usei --output json | jq -r .amount
      env: LATEST_BANK_BALANCE
  verifiers:
    # Bank balance should be 1sei
    - type: eval
      expr: FIRST_HISTORICAL_BANK_BAL == 1000000
    - type: eval
      expr: SECOND_HISTORICAL_BANK_BAL == 2000000
    - type: eval
      expr: LATEST_BANK_BALANCE == 2000000
