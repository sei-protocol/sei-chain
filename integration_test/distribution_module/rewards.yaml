- name: Test withdraw rewards
  inputs:
    # Create test account
    - cmd: seid keys add --keyring-backend test distribution-test
    - cmd: printf "12345678\n" | seid keys show -a node_admin
      env: NODE_ADMIN_ACC
    - cmd: seid keys show -a distribution-test --keyring-backend test
      env: DISTRIBUTION_TEST_ACC
    # Get current rewards
    - cmd: seid q distribution rewards $NODE_ADMIN_ACC -o json | jq -r "(.total[0].amount // 0) | tonumber"
      env: REWARDS_START
    # Fee-paying tx to increase rewards, capturing its inclusion height. Fees from
    # block H are distributed to validators in BeginBlock of H+1, so wait past H
    # before re-reading — a fixed sleep races the block time and flakes (equal reads).
    - cmd: seidbin=seid; chainid=sei; source integration_test/utils/_tx_helpers.sh && bank_send_and_get_height node_admin $DISTRIBUTION_TEST_ACC 1sei
      env: TX_HEIGHT
    - cmd: seidbin=seid; source integration_test/utils/_tx_helpers.sh && wait_until_height_exceeds $TX_HEIGHT
    # Get rewards after tx
    - cmd: seid q distribution rewards $NODE_ADMIN_ACC -o json | jq -r "(.total[0].amount // 0) | tonumber"
      env: REWARDS_AFTER_TX
    # Withdraw all rewards
    - cmd: printf "12345678\n" | seid tx distribution withdraw-all-rewards -b block --fees 2000usei --chain-id sei -y --from node_admin
    # Get rewards after withdraw
    - cmd: seid q distribution rewards $NODE_ADMIN_ACC -o json | jq -r "(.total[0].amount // 0) | tonumber"
      env: REWARDS_AFTER_WITHDRAW
  verifiers:
    # Rewards should have increased
    - type: eval
      expr: REWARDS_AFTER_TX > REWARDS_START
    - type: eval
      expr: REWARDS_AFTER_WITHDRAW < REWARDS_AFTER_TX

