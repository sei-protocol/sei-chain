- name: Test staking proposal should update staking params
  inputs:
    # Get the current params
    - cmd: seid q params subspace staking UnbondingTime --output json | jq -r .value | tr -d "\""
      env: OLD_PARAM
    # Make a new expedited proposal
    - cmd: seidbin=seid; chainid=sei; source integration_test/utils/_tx_helpers.sh && submit_gov_proposal admin "Update Unbonding Time" gov submit-proposal param-change ./integration_test/gov_module/proposal/staking_proposal.json --fees 2000usei
      env: PROPOSAL_ID
    # Get proposal status
    - cmd: seid q gov proposal $PROPOSAL_ID --output json | jq -r .status
      env: PROPOSAL_STATUS
    # Make a deposit
    - cmd: seidbin=seid; chainid=sei; source integration_test/utils/_tx_helpers.sh && submit_tx_and_wait admin gov deposit $PROPOSAL_ID 10000000usei --fees 2000usei
    # sei-node-0 vote yes
    - cmd: seidbin=seid; chainid=sei; source integration_test/utils/_tx_helpers.sh && submit_tx_and_wait node_admin gov vote $PROPOSAL_ID yes --fees 2000usei
      node: sei-node-0
    # sei-node-1 vote yes
    - cmd: seid q gov proposal $PROPOSAL_ID --output json | jq -r .status
    - cmd: seidbin=seid; chainid=sei; source integration_test/utils/_tx_helpers.sh && submit_tx_and_wait node_admin gov vote $PROPOSAL_ID yes --fees 2000usei
      node: sei-node-1
    # sei-node-2 vote yes
    - cmd: seid q gov proposal $PROPOSAL_ID --output json | jq -r .status
    - cmd: seidbin=seid; chainid=sei; source integration_test/utils/_tx_helpers.sh && submit_tx_and_wait node_admin gov vote $PROPOSAL_ID yes --fees 2000usei
      node: sei-node-2
    # sei-node-3 vote yes
    - cmd: seid q gov proposal $PROPOSAL_ID --output json | jq -r .status
    - cmd: seidbin=seid; chainid=sei; source integration_test/utils/_tx_helpers.sh && submit_tx_and_wait node_admin gov vote $PROPOSAL_ID yes --fees 2000usei
      node: sei-node-3
    # since expedited quorum is 0.9, we need 4/4 votes; drive progress until it passes
    - cmd: seidbin=seid; chainid=sei; source integration_test/utils/_tx_helpers.sh && wait_for_proposal_status $PROPOSAL_ID PROPOSAL_STATUS_PASSED 120 admin
      env: PROPOSAL_STATUS
    # Get the params again after proposal is passed
    - cmd: seid q params subspace staking UnbondingTime --output json | jq -r .value | tr -d "\""
      env: NEW_PARAM
    - cmd: seid q staking params --output json | jq .unbonding_time | tr -d "\""
      env: NEW_PARAM_FROM_STAKING
  verifiers:
    # Check if the new params is the expected value after proposal
    - type: eval
      expr: NEW_PARAM == 1814400000000000
    - type: eval
      expr: NEW_PARAM_FROM_STAKING == "1814400s"
