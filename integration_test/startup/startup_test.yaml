- name: Test number of validators should be equal to 4
  inputs:
    # Query num of validators
    - cmd: seid q tendermint-validator-set |grep address |wc -l
      env: RESULT
  verifiers:
  - type: eval
    expr: RESULT == 4

- name: Test node status should report the configured network
  inputs:
    # Confirm status RPC is ready without relying on block production.
    - cmd: seid status |jq -M -r .NodeInfo.network
      env: RESULT
  verifiers:
  - type: eval
    expr: RESULT == "sei"
