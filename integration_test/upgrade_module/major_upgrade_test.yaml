# Major Release Upgrade Scenarios:
# 1. Proposal & Voting:
#    - A major release upgrade is proposed for a future block height.
#    - All nodes vote in favor of the proposal.

# 2. Early Upgrade:
#    - Node 0 is prematurely upgraded to the major release.
#    - It's verified that this node panics due to the early upgrade.

# 3. Target Block Height:
#    - The network reaches the proposed upgrade block height.
#    - At least one non-upgraded node among 1, 2, and 3 panics and logs "UPGRADE NEEDED".
#    - The remaining non-upgraded nodes may stay at target height - 1 until the panicked peer is upgraded.

# 4. Post-Upgrade Behavior:
#    - Nodes 1, 2, and 3 are upgraded to the major release and resume normal operation.
#    - Node 0, which was prematurely upgraded, is downgraded to sync with the network.
#    - Once synced, Node 0 also panics at the upgrade height and logs the "UPGRADE NEEDED" message.
#    - Finally, Node 0 is upgraded to the major release and resumes normal operation.

# 5. Final State:
#    - All nodes are verified to be running smoothly post-upgrade.


- name: Test Major Release Upgrade
  inputs:
    - cmd: echo "v2.0.0"
      env: VERSION
    # PASS PROPOSAL FOR MAJOR UPGRADE
    # Get block for 60s from now
    - cmd: proposal_target_height.sh 60
      env: TARGET_HEIGHT
      node: sei-node-0

    # Submit the software upgrade proposal
    - cmd: proposal_submit.sh $TARGET_HEIGHT major $VERSION
      env: PROPOSAL_ID
      node: sei-node-0

    # Vote with all nodes
    - cmd: proposal_vote.sh $PROPOSAL_ID
      node: sei-node-0
    - cmd: proposal_vote.sh $PROPOSAL_ID
      node: sei-node-1
    - cmd:  proposal_vote.sh $PROPOSAL_ID
      node: sei-node-2
    - cmd:  proposal_vote.sh $PROPOSAL_ID
      node: sei-node-3

    # Wait for the proposal to pass
    - cmd: proposal_wait_for_pass.sh $PROPOSAL_ID node_admin
      node: sei-node-0

    # EXECUTE UPGRADE SCENARIOS
    # Confirm no panic before upgrade and block height
    - cmd: verify_running.sh
      node: sei-node-0
      env: RUNNING_BEFORE_UPGRADE_NODE_0
    - cmd: verify_running.sh
      node: sei-node-1
      env: RUNNING_BEFORE_UPGRADE_NODE_1
    - cmd: verify_running.sh
      node: sei-node-2
      env: RUNNING_BEFORE_UPGRADE_NODE_2
    - cmd: verify_running.sh
      node: sei-node-3
      env: RUNNING_BEFORE_UPGRADE_NODE_3

    # Upgrade to major release (node 0)
    # Node 0 should panic soon. 
    - cmd: seid_upgrade.sh $VERSION
      node: sei-node-0    

    # Majority of nodes is guaranteed to reach TARGET_HEIGHT-1.
    # Since node 0 is down, this majority is exactly nodes 1,2,3.
    # Afterwards one of them can panic (require upgrade)
    # delivering their precommit vote for TARGET_HEIGHT to other nodes,
    # which will make the other nodes stuck at TARGET_HEIGHT-1 until the panicked one is upgraded.
    - cmd: wait_for_height.sh $((TARGET_HEIGHT - 1)) node_admin
      node: sei-node-1
    - cmd: wait_for_height.sh $((TARGET_HEIGHT - 1)) node_admin
      node: sei-node-2
    - cmd: wait_for_height.sh $((TARGET_HEIGHT - 1)) node_admin
      node: sei-node-3

    # node 0 should have panicked somewhere along the way.
    # We check this AFTER we forced progress on the chain because:
    # - panic occurs only once node has to process a block with incompatible version
    # - chain is not guaranteed to produce ANY blocks when there is no traffic (see autobahn case)
    # - verify_panic.sh does not generate traffic on its own.
    - cmd: verify_panic.sh
      node: sei-node-0
      env: PANIC_NODE_0

    # At least one of 1,2,3 reached TARGET_HEIGHT and panicked.
    - cmd: verify_panic.sh
      node: sei-node-1
      env: PANIC_NODE_1  
    - cmd: verify_panic.sh
      node: sei-node-2
      env: PANIC_NODE_2
    - cmd: verify_panic.sh
      node: sei-node-3
      env: PANIC_NODE_3
    - cmd: verify_upgrade_needed_log.sh $TARGET_HEIGHT $VERSION
      node: sei-node-1
      env: LOG_AT_BLOCK_HEIGHT_NODE_1
    - cmd: verify_upgrade_needed_log.sh $TARGET_HEIGHT $VERSION
      node: sei-node-2
      env: LOG_AT_BLOCK_HEIGHT_NODE_2
    - cmd: verify_upgrade_needed_log.sh $TARGET_HEIGHT $VERSION
      node: sei-node-3
      env: LOG_AT_BLOCK_HEIGHT_NODE_3

    # Upgrade all nodes to major release, expect them running
    - cmd: seid_upgrade.sh $VERSION
      node: sei-node-1
    - cmd: seid_upgrade.sh $VERSION
      node: sei-node-2
    - cmd: seid_upgrade.sh $VERSION
      node: sei-node-3
    - cmd: verify_running.sh
      node: sei-node-1
      env: RUNNING_UPGRADED_NODE_1
    - cmd: verify_running.sh
      node: sei-node-2
      env: RUNNING_UPGRADED_NODE_2
    - cmd: verify_running.sh
      node: sei-node-3
      env: RUNNING_UPGRADED_NODE_3

    # Downgrade node 0 so that it can sync the rest of the blocks
    # It successfully reach TARGET_HEIGHT, panic, and log upgrade needed.
    - cmd: seid_downgrade.sh
      node: sei-node-0
    - cmd: wait_for_height.sh $TARGET_HEIGHT node_admin
      node: sei-node-0
    - cmd: verify_panic.sh
      node: sei-node-0
      env: PANIC_AT_BLOCK_HEIGHT_NODE_0 
    - cmd: verify_upgrade_needed_log.sh $TARGET_HEIGHT $VERSION
      node: sei-node-0
      env: LOG_AT_BLOCK_HEIGHT_NODE_0 

    # Upgrade node 0 now that it has caught up, it should be running
    - cmd: seid_upgrade.sh $VERSION
      node: sei-node-0
    - cmd: verify_running.sh
      node: sei-node-0
      env: RUNNING_UPGRADED_NODE_0

  verifiers:
    # Nodes are running before upgrade
    - type: eval
      expr: RUNNING_BEFORE_UPGRADE_NODE_0 == "PASS"
    - type: eval
      expr: RUNNING_BEFORE_UPGRADE_NODE_1 == "PASS"
    - type: eval
      expr: RUNNING_BEFORE_UPGRADE_NODE_2 == "PASS"
    - type: eval
      expr: RUNNING_BEFORE_UPGRADE_NODE_3 == "PASS"

    # Upgrade to major release (node 0)
    # Node 0 should panic soon. 
    - type: eval
      expr: PANIC_NODE_0 == "PASS"

    # Majority of nodes is guaranteed to reach TARGET_HEIGHT-1.
    # At least one of 1,2,3 reached TARGET_HEIGHT, panicked, and logged upgrade needed.
    - type: eval
      expr: PANIC_NODE_1 == "PASS" or PANIC_NODE_2 == "PASS" or PANIC_NODE_3 == "PASS"
    - type: eval
      expr: LOG_AT_BLOCK_HEIGHT_NODE_1 == "PASS" or LOG_AT_BLOCK_HEIGHT_NODE_2 == "PASS" or LOG_AT_BLOCK_HEIGHT_NODE_3 == "PASS"

    # Upgrade all nodes to major release, expect them running
    - type: eval
      expr: RUNNING_UPGRADED_NODE_1 == "PASS"
    - type: eval
      expr: RUNNING_UPGRADED_NODE_2 == "PASS"
    - type: eval
      expr: RUNNING_UPGRADED_NODE_3 == "PASS"

    # Downgrade node 0 so that it can sync the rest of the blocks
    # It successfully reach TARGET_HEIGHT, panic, and log upgrade needed.
    - type: eval
      expr: PANIC_AT_BLOCK_HEIGHT_NODE_0 == "PASS"
    - type: eval
      expr: LOG_AT_BLOCK_HEIGHT_NODE_0 == "PASS"

    # Upgrade node 0 now that it has caught up, it should be running
    - type: eval
      expr: RUNNING_UPGRADED_NODE_0 == "PASS"
