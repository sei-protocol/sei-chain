name: AI Review

on:
  # Seed the pending status as soon as the PR is ready, so the check shows up
  # and blocks merge until the reviewers resolve it.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Re-evaluate whenever a check run completes. We filter to the reviewers we
  # care about in the job-level `if` so unrelated checks don't spin up a runner.
  check_run:
    types: [completed]
  merge_group:

permissions:
  checks: read
  statuses: write

jobs:
  evaluate:
    # Wake up only for things we act on:
    #   - merge_group            -> stamp success (reviewers don't run on the queue commit)
    #   - non-draft pull_request -> seed the pending status, then evaluate
    #   - check_run completed AND it's one of our reviewers
    if: >
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'check_run' &&
        contains(fromJSON('["Cursor Bugbot","Claude Code Review"]'), github.event.check_run.name))
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v8.0.0
        with:
          script: |
            const REQUIRED = [
              { name: "Cursor Bugbot",      accept: ["neutral", "success"] },
              { name: "Claude Code Review", accept: ["neutral", "success"] }, // confirm name
            ]
            const statusContext = "AI Review"

            // The SHA the reviewers ran against. Note: for check_run events the
            // workflow *definition* is read from the default branch, but the SHA
            // below still points at the PR's head commit, so the status lands
            // in the right place.
            let sha
            if (context.eventName === "pull_request") sha = context.payload.pull_request.head.sha
            else if (context.eventName === "check_run") sha = context.payload.check_run.head_sha
            else if (context.eventName === "merge_group") sha = context.payload.merge_group.head_sha

            const targetUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`
            const setStatus = (state, description) =>
              github.rest.repos.createCommitStatus({
                owner: context.repo.owner, repo: context.repo.repo, sha,
                state, context: statusContext,
                description: description.slice(0, 140), target_url: targetUrl,
              })

            // Merge queue: reviewers don't re-run here, so satisfy the required
            // status on the merge commit directly.
            if (context.eventName === "merge_group") {
              await setStatus("success", "Not evaluated in merge queue")
              return
            }

            // PR opened/updated/ready: show a pending status immediately, then
            // fall through to evaluate (a reviewer may already be done).
            if (context.eventName === "pull_request") {
              await setStatus("pending", "Waiting for required reviews")
            }

            // Evaluate the current state of every required check ONCE. No loop:
            // each reviewer completing re-triggers this workflow via check_run.
            async function latestRun(name) {
              const runs = await github.paginate(github.rest.checks.listForRef, {
                owner: context.repo.owner, repo: context.repo.repo,
                ref: sha, check_name: name, per_page: 100,
              })
              runs.sort((a, b) => new Date(b.started_at ?? 0) - new Date(a.started_at ?? 0))
              return runs[0]
            }

            const runs = await Promise.all(REQUIRED.map(r => latestRun(r.name)))
            const failures = [], pending = []
            REQUIRED.forEach((r, i) => {
              const run = runs[i]
              if (!run) pending.push(`${r.name} (not started)`)
              else if (run.status !== "completed") pending.push(`${r.name} (${run.status})`)
              else if (!r.accept.includes(run.conclusion)) failures.push(`${r.name} → "${run.conclusion}"`)
            })

            if (failures.length) {
              await setStatus("failure", `Review required: ${failures.join("; ")}`)
            } else if (pending.length === 0) {
              await setStatus("success", "All required reviews passed")
            } else {
              // Still waiting on someone — leave it pending and exit. The next
              // reviewer's completion will re-trigger this and re-check.
              await setStatus("pending", `Waiting for: ${pending.join(", ")}`)
              core.info(`Still pending: ${pending.join(", ")}`)
            }