name: AI Review

on:
  # Seed / refresh the status when the PR is opened, pushed to, or marked ready.
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
  # Post the verdict whenever a reviewer's check completes. Filtered to our
  # reviewers in the job-level `if`.
  check_run:
    types: [ completed, created, rerequested ]
  merge_group:

permissions:
  checks: read
  statuses: write

jobs:
  evaluate:
    if: >
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'check_run' &&
        contains(fromJSON('["Cursor Bugbot","Claude Code Review"]'), github.event.check_run.name))
    concurrency:
      group: >-
        ai-review-${{ github.event.check_run.head_sha
          || github.event.pull_request.head.sha
          || github.event.merge_group.head_sha }}
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PLATFORM_CODE_AGENT_APP_ID }}
          private-key: ${{ secrets.PLATFORM_CODE_AGENT_APP_PK }}
      - uses: actions/github-script@v9
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const REQUIRED = [
              { name: "Cursor Bugbot" },
              { name: "Claude Code Review" },
            ]
            const statusContext = "AI Review"
            const PASSING = ["success"]
            const ADVISORY = ["neutral", "skipped"]
            const REJECTING = ["failure", "action_required"]  // genuine "changes needed"

            // Head SHA the reviewers ran against. For check_run events the
            // workflow file is read from the default branch, but this SHA still
            // points at the PR head, so the status lands in the right place.
            let sha
            if (context.eventName === "pull_request") sha = context.payload.pull_request.head.sha
            else if (context.eventName === "check_run") sha = context.payload.check_run.head_sha
            else if (context.eventName === "merge_group") sha = context.payload.merge_group.head_sha

            const targetUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`
            const setStatus = (state, description) =>
              github.rest.repos.createCommitStatus({
                owner: context.repo.owner, repo: context.repo.repo, sha,
                state, context: statusContext,
                description: description.slice(0, 140), target_url: targetUrl,
              })
            async function latestAiReviewStatus() {
              const statuses = await github.paginate(github.rest.repos.listCommitStatusesForRef, {
                owner: context.repo.owner, repo: context.repo.repo,
                ref: sha, per_page: 100,
              })
              return statuses
                .filter(status => status.context === statusContext)
                .sort((a, b) => new Date(b.created_at ?? 0) - new Date(a.created_at ?? 0))[0]
            }

            // Merge queue: reviewers don't re-run here.
            if (context.eventName === "merge_group") {
              await setStatus("success", "Merge queue — auto-pass")
              return
            }

            // --- Gather the state of every required reviewer ----------------
            async function latestRun(name) {
              const runs = await github.paginate(github.rest.checks.listForRef, {
                owner: context.repo.owner, repo: context.repo.repo,
                ref: sha, check_name: name, per_page: 100,
              })
              const latestRunTime = run => new Date(
                run.started_at ?? run.updated_at ?? run.created_at ?? 0
              )
              runs.sort((a, b) => latestRunTime(b) - latestRunTime(a))
              return runs[0]
            }
            const runs = await Promise.all(REQUIRED.map(r => latestRun(r.name)))

            const blockers = []      // completed with a rejecting conclusion
            const inconclusive = []  // completed without a verdict; rerun needed
            const inProgress = []    // started but not finished
            const notStarted = []    // no run yet
            const advisory = []      // accepted but non-blocking (neutral/skipped)
            REQUIRED.forEach((r, i) => {
              const run = runs[i]
              if (!run) { notStarted.push(r.name); return }
              if (run.status !== "completed") { inProgress.push(r.name); return }
              if (REJECTING.includes(run.conclusion)) {
                blockers.push({ name: r.name, conclusion: run.conclusion }); return
              }
              if (PASSING.includes(run.conclusion)) return
              if (ADVISORY.includes(run.conclusion)) {
                advisory.push(run.conclusion === "neutral" ? r.name : `${r.name} (${run.conclusion})`)
                return
              }
              inconclusive.push({ name: r.name, conclusion: run.conclusion ?? "unknown" })
            })
            const stillOut = inProgress.length + notStarted.length + inconclusive.length

            // --- Decide verdict + message -----------------------------------
            // FAILURE: at least one reviewer posted a genuine "changes needed" verdict.
            if (blockers.length) {
              const saidNo = blockers.map(b => b.name)
              const msg = `Nope. ${saidNo.join(", ")} ${saidNo.length > 1 ? "have" : "has"} blocking notes`
              await setStatus("failure", msg)
              return
            }

            // SUCCESS: everyone finished, nothing blocked. Safe to post from any event.
            if (stillOut === 0) {
              const msg = advisory.length === 0
                ? "Good to go — all clear"
                : `Not gonna block it — ${advisory.join(", ")}`
              await setStatus("success", msg)
              return
            }

            // PENDING: still waiting on someone. Only (re)post from a
            // pull_request event. Posting pending from a check_run evaluation
            // lets a stale parallel run clobber a success a newer run already
            // wrote (commit statuses are last-write-wins), so we skip it here
            // and just wait for the next reviewer to complete.
            const done = REQUIRED.length - stillOut
            const waiting = [...inProgress.map(n => `${n} (running)`),
                             ...notStarted.map(n => `${n} (not started)`),
                             ...inconclusive.map(r => `${r.name} (${r.conclusion}; rerun needed)`)].join(", ")
            const msg = inconclusive.length
              ? `Review incomplete (${done}/${REQUIRED.length} accepted) — ${waiting}`
              : inProgress.length
                ? `Still reviewing (${done}/${REQUIRED.length} in) — ${waiting}`
                : `Waiting for reviewers to start — ${waiting}`

            if (context.eventName === "pull_request") {
              const current = await latestAiReviewStatus()
              if (current && current.state !== "pending") {
                core.info(`Skipping pending because ${statusContext} is already ${current.state}`)
                return
              }
              await setStatus("pending", msg)
            } else {
              core.info(`Pending: ${msg}`)
            }