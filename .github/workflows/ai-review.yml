name: AI Review

on:
  pull_request:
  merge_group:

jobs:
  check-reviews:
    runs-on: ubuntu-24.04
    permissions:
      checks: read
    timeout-minutes: 10
    steps:
      - name: Require Bugbot and Claude reviews
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const sha = context.payload.pull_request.head.sha
            const deadline = Date.now() + 8 * 60 * 1000
            const pollMs = 15 * 1000

            const required = [
              { name: "Cursor Bugbot",      accept: ["neutral"] },
              { name: "Claude Code Review", accept: ["neutral", "success"] }, // confirm name
            ]

            async function latestRun(name) {
              const runs = await github.paginate(github.rest.checks.listForRef, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
                check_name: name,
                per_page: 100,
              })
              runs.sort((a, b) =>
                new Date(b.started_at ?? 0) - new Date(a.started_at ?? 0))
              return runs[0]
            }

            while (true) {
              const runs = await Promise.all(required.map(r => latestRun(r.name)))
              const failures = []
              const pending = []

              required.forEach((r, i) => {
                const run = runs[i]
                if (!run) {
                  pending.push(`${r.name} (not started)`)
                } else if (run.status !== "completed") {
                  pending.push(`${r.name} (${run.status})`)
                } else if (!r.accept.includes(run.conclusion)) {
                  failures.push(`${r.name} → "${run.conclusion}"`)
                }
              })

              if (failures.length) {
                core.setFailed(`Review required: ${failures.join("; ")}`)
                return
              }
              if (pending.length === 0) {
                return
              }
              if (Date.now() > deadline) {
                core.setFailed(`Timed out waiting for: ${pending.join(", ")}`)
                return
              }
              core.info(`Waiting for: ${pending.join(", ")}`)
              await new Promise(r => setTimeout(r, pollMs))
            }