name: Buf
on:
  pull_request:
    types: [ opened, synchronize, reopened, labeled, unlabeled ]
  merge_group:
permissions:
  contents: read
  pull-requests: write
jobs:
  buf:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          version: 1.58.0
          # TODO: re-enable after sei-iavl/proto removal merges to main.
          # buf breaking fails when module count differs between branch and base
          # (8 modules on this branch vs 9 on main). This is a one-time issue.
          breaking: false