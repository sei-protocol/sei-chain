name: Buf
on:
  pull_request:
    types: [ opened, synchronize, reopened, labeled, unlabeled ]
  merge_group:
permissions:
  contents: read
  pull-requests: write
jobs:
  buf:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          version: 1.58.0
          breaking: false