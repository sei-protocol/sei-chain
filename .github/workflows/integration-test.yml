# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Docker Integration Test

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**
  merge_group:
    branches:
      - main
      - release/**

defaults:
  run:
    shell: bash

jobs:
  # Build localnode/rpcnode images and seid once; matrix jobs pull the images
  # from GHCR (tagged with the run id) and download seid as a small artifact.
  prepare-cluster:
    name: Prepare integration test cluster
    runs-on: ubuntu-large
    timeout-minutes: 45
    # packages:write required to push images and buildx cache to GHCR. Fork PRs
    # cannot publish org packages, so integration tests cannot run from forks; a
    # maintainer must push external contributions to a branch on this repo.
    # cache-to is restricted to push events to avoid cache thrashing on PRs.
    permissions:
      packages: write
      contents: read
    env:
      GHCR_LOCALNODE: ghcr.io/sei-protocol/sei-chain-integration-test-localnode
      GHCR_RPCNODE: ghcr.io/sei-protocol/sei-chain-integration-test-rpcnode
    steps:
      - uses: actions/checkout@v5
      - name: Login to Docker Hub
        # See: https://github.com/docker/login-action/releases/tag/v4.2.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        if: env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        # See: https://github.com/docker/login-action/releases/tag/v4.2.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        # See: https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: Build localnode image (cached)
        uses: docker/build-push-action@v6
        with:
          context: docker/localnode
          file: docker/localnode/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: sei-chain/localnode
          # Run-id label makes each run's image digest unique (config-only
          # change, layer cache unaffected) so old run tags can be pruned without
          # touching digests other runs still reference.
          labels: sei-chain.ci-run-id=${{ github.run_id }}
          cache-from: type=registry,ref=${{ env.GHCR_LOCALNODE }}:cache
          cache-to: ${{ github.event_name == 'push' && format('type=registry,ref={0}:cache,mode=max', env.GHCR_LOCALNODE) || '' }}
      - name: Build rpcnode image (cached)
        uses: docker/build-push-action@v6
        with:
          context: docker/rpcnode
          file: docker/rpcnode/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: sei-chain/rpcnode
          labels: sei-chain.ci-run-id=${{ github.run_id }}
          cache-from: type=registry,ref=${{ env.GHCR_RPCNODE }}:cache
          cache-to: ${{ github.event_name == 'push' && format('type=registry,ref={0}:cache,mode=max', env.GHCR_RPCNODE) || '' }}
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'
      - name: Build seid binary in localnode container
        env:
          DOCKER_PLATFORM: linux/amd64
        run: make build-seid-in-localnode-ci
      # Registry pulls are content-addressed and retried per layer by the docker client
      - name: Push images to GHCR for test jobs
        run: |
          docker tag sei-chain/localnode "${GHCR_LOCALNODE}:${{ github.run_id }}"
          docker tag sei-chain/rpcnode "${GHCR_RPCNODE}:${{ github.run_id }}"
          docker push "${GHCR_LOCALNODE}:${{ github.run_id }}"
          docker push "${GHCR_RPCNODE}:${{ github.run_id }}"
      - name: Package CI artifacts
        run: tar -czf integration-build.tar.gz build/seid
      - name: Upload integration CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integration-ci-artifacts
          path: integration-build.tar.gz
          retention-days: 1

  integration-tests:
    name: Integration Test (${{ matrix.test.name }})
    needs: prepare-cluster
    runs-on: ubuntu-large
    timeout-minutes: 30
    permissions:
      packages: read
      contents: read
    env:
      JOB_TIMEOUT: 28m
      GHCR_LOCALNODE: ghcr.io/sei-protocol/sei-chain-integration-test-localnode
      GHCR_RPCNODE: ghcr.io/sei-protocol/sei-chain-integration-test-rpcnode
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DAPP_TESTS_MNEMONIC: ${{ secrets.DAPP_TESTS_MNEMONIC }}
    strategy:
      # other jobs should run even if one integration test fails
      fail-fast: false
      matrix:
        test: [
          {
            name: "Wasm Module",
            scripts: [
              "docker exec sei-node-0 integration_test/contracts/deploy_timelocked_token_contract.sh",
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestWasmModuleCore",
              "docker exec sei-node-0 integration_test/contracts/deploy_timelocked_token_contract.sh",
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestWasmModuleEmergencyWithdraw"
            ]
          },
          {
            name: "Mint & Staking & Bank Module",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run \"TestMintModule|TestStakingModule|TestBankModule\""
            ]
          },
          {
            name: "Autobahn Mint & Staking & Bank Module",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run \"TestMintModule|TestStakingModule|TestAutobahnBankModule\""
            ]
          },
          {
            name: "Gov & Oracle & Authz Module",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run \"TestGovModule|TestOracleModule|TestAuthzModule\""
            ]
          },
          {
            name: "Autobahn Gov & Oracle & Authz Module",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run \"TestGovModule|TestOracleModule|TestAuthzModule\""
            ]
          },
          {
            name: "Chain Operation Test",
            env: "GIGA_STORAGE=true",
            scripts: [
              "until [ $(cat build/generated/rpc-launch.complete |wc -l) = 1 ]; do sleep 10; done",
              "until [[ $(docker exec sei-rpc-node build/seid status |jq -M -r .SyncInfo.latest_block_height) -gt 10 ]]; do sleep 10; done",
              "echo rpc node started",
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run \"TestChainOperation|TestStateSync\"",
              "./integration_test/contracts/verify_statesync_flatkv_digest.sh",
              "./integration_test/contracts/verify_cross_validator_flatkv_digest.sh"
            ]
          },
          {
            name: "Distribution Module",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestDistributionModule"
            ]
          },
          {
            name: "Upgrade Module (Major)",
            env: "GIGA_STORAGE=true UPGRADE_VERSION_LIST=v1.0.0,v1.0.1,v1.0.2",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestUpgradeMajor"
            ]
          },
          {
            name: "Autobahn Upgrade Module (Major)",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true UPGRADE_VERSION_LIST=v1.0.0,v1.0.1,v1.0.2",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestUpgradeMajor"
            ]
          },
          {
            name: "Upgrade Module (Minor)",
            env: "GIGA_STORAGE=true UPGRADE_VERSION_LIST=v1.0.0,v1.0.1,v1.0.2",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestUpgradeMinor"
            ]
          },
          {
            name: "Autobahn Upgrade Module (Minor)",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true UPGRADE_VERSION_LIST=v1.0.0,v1.0.1,v1.0.2",
            scripts: [
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestUpgradeMinor"
            ]
          },
          {
            name: "SeiDB State Store",
            scripts: [
              "docker exec sei-node-0 integration_test/contracts/deploy_wasm_contracts.sh",
              "docker exec sei-node-0 integration_test/contracts/create_tokenfactory_denoms.sh",
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestSeiDBStateStore"
            ]
          },
          {
            name: "Autobahn SeiDB State Store",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true",
            scripts: [
              "docker exec sei-node-0 integration_test/contracts/deploy_wasm_contracts.sh",
              "docker exec sei-node-0 integration_test/contracts/create_tokenfactory_denoms.sh",
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestSeiDBStateStore"
            ]
          },
          {
            # Umbrella job for all FlatKV-specific docker-level coverage.
            # Future FlatKV scenarios (additional bucket layouts, snapshot
            # rotation, etc.) should be appended here rather than added as
            # new matrix rows, so the CI surface stays one row per concern.
            #
            # The cluster boots with GIGA_STORAGE=true, so FlatKV is enabled
            # from genesis (sc-write-mode = test_only_dual_write) and the
            # FlatKV LtHash is folded into every block's AppHash from block 1.
            # No mid-life migration is exercised here; an offline
            # memiavl -> FlatKV import would change the AppHash trajectory
            # at the import boundary and break tendermint replay.
            #
            # Step ordering:
            #   1-3  Deploy an EVM fixture, smoke-check EVM RPC reads, and
            #        verify the fixture round-tripped through dual_write into
            #        physical FlatKV.
            #   4    SIGKILL one validator, restart, and assert 4-node FlatKV
            #        digest equality. Exercises WAL recovery on a live FlatKV
            #        cluster.
            #   5-7  Destructive disaster-recovery scenarios. They run last
            #        because they wipe or damage one validator's local state.
            name: "FlatKV Integration",
            env: "GIGA_STORAGE=true",
            scripts: [
              "docker exec sei-node-0 integration_test/contracts/deploy_flatkv_evm_fixture.sh",
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestSeiDBFlatKV",
              "docker exec sei-node-0 integration_test/contracts/verify_flatkv_evm_store.sh",
              "./integration_test/contracts/verify_flatkv_crash_recovery.sh",
              "./integration_test/contracts/verify_flatkv_statesync_crash_recovery.sh",
              "./integration_test/contracts/verify_flatkv_total_loss_recovery.sh",
              "./integration_test/contracts/verify_flatkv_partial_loss_fails_loudly.sh"
            ]
          },
          {
            # Post-migration FlatKV-only state-sync coverage.
            #
            # The cluster boots directly in sc-write-mode = flatkv_only, so
            # memiavl is not allocated and all module state is served from
            # FlatKV. The script kills and wipes one validator, configures it
            # for state-sync from the remaining validators, and verifies the
            # recovered FlatKV digest matches the donors at a shared height.
            name: "FlatKV Only State Sync",
            env: "GIGA_FLATKV_ONLY=true",
            scripts: [
              "docker exec sei-node-0 integration_test/contracts/deploy_flatkv_evm_fixture.sh",
              "./integration_test/contracts/verify_flatkv_only_statesync.sh",
            ],
          },
          {
            name: "EVM Module (Compat)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_compat_tests.sh",
            ]
          },
          {
            name: "EVM Module (Precompile & Endpoints)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_precompile_tests.sh",
              "docker exec sei-node-0 integration_test/contracts/deploy_flatkv_evm_fixture.sh",
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestSeiDBFlatKV",
              "docker exec sei-node-0 integration_test/contracts/verify_flatkv_evm_store.sh"
            ]
          },
          {
            name: "Autobahn EVM Module (Compat)",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_compat_tests.sh",
            ]
          },
          {
            name: "Autobahn EVM Module (Precompile & Endpoints)",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_precompile_tests.sh",
              "docker exec sei-node-0 integration_test/contracts/deploy_flatkv_evm_fixture.sh",
              "go test -tags yaml_integration -v -timeout $JOB_TIMEOUT ./integration_test/runner/... -run TestSeiDBFlatKV",
              "docker exec sei-node-0 integration_test/contracts/verify_flatkv_evm_store.sh"
            ]
          },
          {
            name: "EVM Interoperability (Pointer Tests)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_interoperability_pointer_tests.sh"
            ]
          },
          {
            name: "EVM Interoperability (Misc Tests)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_interoperability_misc_tests.sh"
            ]
          },
          {
            name: "Autobahn EVM Interoperability (Pointer Tests)",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_interoperability_pointer_tests.sh"
            ]
          },
          {
            name: "Autobahn EVM Interoperability (Misc Tests)",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_interoperability_misc_tests.sh"
            ]
          },
          {
            name: "Disable WASM Tests",
            scripts: [
              "./integration_test/evm_module/scripts/disable_wasm.sh",
            ]
          },
          {
            name: "dApp Tests (Uniswap)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/dapp_tests/dapp_uniswap_tests.sh"
            ]
          },
          {
            name: "dApp Tests (NFT & Steak)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/dapp_tests/dapp_nft_steak_tests.sh"
            ]
          },
          {
            name: "EVM GIGA Module",
            env: "GIGA_STORAGE=true GIGA_EXECUTOR=true GIGA_OCC=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_giga_tests.sh"
            ]
          },
          {
            name: "Autobahn EVM GIGA Module",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true GIGA_OCC=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_giga_tests.sh"
            ]
          },
          {
            name: "EVM GIGA Mixed (Determinism)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_giga_mixed_tests.sh"
            ]
          },
          {
            name: "EVM RPC .io/.iox (spec fixtures)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_rpc_tests.sh"
            ]
          },
          {
            name: "Autobahn RPC .io/.iox (spec fixtures)",
            env: "AUTOBAHN=true GIGA_EXECUTOR=true GIGA_STORAGE=true",
            scripts: [
              "./integration_test/evm_module/scripts/evm_rpc_tests.sh"
            ]
          },
          {
            name: "EVM RPC Parity (geth reference)",
            env: "GIGA_STORAGE=true",
            scripts: [
              "./integration_test/rpc_tests/scripts/run-ci.sh"
            ]
          },
        ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'
      - name: Login to Docker Hub
        # See: https://github.com/docker/login-action/releases/tag/v4.2.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        if: env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        # See: https://github.com/docker/login-action/releases/tag/v4.2.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download integration CI artifacts
        uses: actions/download-artifact@v4
        with:
          name: integration-ci-artifacts
      - name: Load prebuilt seid and pull Docker images
        run: |
          tar -xzf integration-build.tar.gz
          pull_with_retry() {
            local ref="$1"
            for attempt in 1 2 3 4 5; do
              if docker pull "$ref"; then return 0; fi
              echo "docker pull $ref failed (attempt $attempt), retrying in $((attempt*5))s..."
              sleep $((attempt*5))
            done
            echo "docker pull $ref failed after 5 attempts"; return 1
          }
          pull_with_retry "${GHCR_LOCALNODE}:${{ github.run_id }}"
          pull_with_retry "${GHCR_RPCNODE}:${{ github.run_id }}"
          docker tag "${GHCR_LOCALNODE}:${{ github.run_id }}" sei-chain/localnode
          docker tag "${GHCR_RPCNODE}:${{ github.run_id }}" sei-chain/rpcnode
      - name: Start 4 node docker cluster
        run: DOCKER_DETACH=true INVARIANT_CHECK_INTERVAL=10 ${{matrix.test.env}} make docker-cluster-start-ci

      - name: Wait for docker cluster to start
        run: |
          until [ $(cat build/generated/launch.complete |wc -l) = 4 ]
          do
            sleep 10
          done
          sleep 10

      - name: Start rpc node
        run: ${{matrix.test.env}} make run-rpc-node-integration-ci &

      - name: Verify Sei Chain is running
        run: go test -tags yaml_integration -v -timeout 5m ./integration_test/runner/... -run TestStartup

      - name: ${{ matrix.test.name }}
        run: |
          scripts=$(echo '${{ toJson(matrix.test.scripts) }}' | jq -r '.[]')
          IFS=$'\n'   # change the internal field separator to newline
          echo $scripts
          for script in $scripts
          do
            bash -c "${script}"
          done
          unset IFS  # revert the internal field separator back to default

      - name: Print node logs on failure
        if: ${{ failure() }}
        run: |
          set -euo pipefail
          for c in sei-node-0 sei-node-1 sei-node-2 sei-node-3; do
            echo "==================== ${c} (docker logs tail) ===================="
            docker logs --tail 200 "${c}" || true
            echo "==================== ${c} (seid log file tail) ===================="
            # Logs are accessible on host since build/generated is mounted in containers
            NODE_ID=${c#sei-node-}
            if [ -f "build/generated/logs/seid-${NODE_ID}.log" ]; then
              tail -200 "build/generated/logs/seid-${NODE_ID}.log" || true
            fi
          done

      - name: Prepare log artifact name
        if: ${{ always() }}
        id: log_artifact_meta
        run: |
          raw="${{ matrix.test.name }}"
          safe=$(echo "$raw" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g')
          if [ -z "$safe" ]; then
            safe="logs"
          fi
          echo "artifact_name=$safe" >> $GITHUB_OUTPUT

      - name: Collect logs directory
        if: ${{ always() }}
        run: |
          LOG_ROOT="artifacts/sei-${{ steps.log_artifact_meta.outputs.artifact_name }}"
          mkdir -p "$LOG_ROOT"
          if [ -d build/generated/logs ]; then
            cp -r build/generated/logs "$LOG_ROOT/"
          else
            echo "No logs directory found"
          fi

      - name: Upload logs directory
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-${{ steps.log_artifact_meta.outputs.artifact_name }}
          path: artifacts/sei-${{ steps.log_artifact_meta.outputs.artifact_name }}
          if-no-files-found: warn

      - name: Upload RPC parity test report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rpc-parity-report-${{ steps.log_artifact_meta.outputs.artifact_name }}
          path: integration_test/rpc_tests/reports/merged
          if-no-files-found: ignore

  integration-test-check:
    name: Integration Test Check
    runs-on: ubuntu-latest
    needs: [prepare-cluster, integration-tests]
    if: always()
    steps:
      - name: Verify prepare and test jobs succeeded
        run: |
          if [[ "${{ needs.prepare-cluster.result }}" != "success" ]]; then
            echo "prepare-cluster job did not succeed (${{ needs.prepare-cluster.result }})"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "integration-tests job did not succeed (${{ needs.integration-tests.result }})"
            exit 1
          fi
          echo "All integration test jobs passed."
