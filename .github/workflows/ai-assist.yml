name: AI Assistant
on:
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  pull_request_review:
    types: [ submitted ]
jobs:
  assistant:
    uses: sei-protocol/uci/.github/workflows/ai-assistant.yml@v0.0.12
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    secrets: inherit
    with:
      uci-ref: v0.0.12
      allowed-team: 'sei-protocol/sei-core'
