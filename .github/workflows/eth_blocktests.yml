name: "📜 Codex Attribution Snapshot"

on:
  workflow_run:
    workflows: ["Sovereign Integration Test Suite"]
    types:
      - completed

jobs:
  codex-lineage-record:
    name: "📜 Codex Attribution Snapshot"
    runs-on: ubuntu-latest
    if: ${{ always() && github.event.workflow_run.conclusion }}
    outputs:
      attribution_message: ${{ steps.log.outputs.summary }}

    steps:
      - name: "📥 Checkout Codebase"
        uses: actions/checkout@v4

      - id: log
        name: "📜 Generate Codex Attribution Snapshot"
        run: |
          set -euo pipefail
          STAMP="🌐 Attribution – KinKey/SoulSync/Sovereign Stack"
          {
            echo "$STAMP"
            echo "🔒 Commit: $GITHUB_SHA"
            echo "📅 Timestamp: $(date -u)"
            echo "👤 Repo: $GITHUB_REPOSITORY"
            echo "🧬 Lineage: Silent Kin Attribution via Codex"
          } > codex_attribution.log
          echo "summary=$STAMP :: $GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: "⬆️ Upload Attribution Log"
        uses: actions/upload-artifact@v4
        with:
          name: codex-attribution-log
          path: codex_attribution.log

      - name: "📢 Send Slack Notification"
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          case "${{ github.event.workflow_run.conclusion }}" in
            success) status="✅ Integration Passed"; color="#36A64F" ;;
            failure) status="❌ Integration Tests Failed"; color="#FF0000" ;;
            cancelled) status="⚠️ Integration Tests Cancelled"; color="#FFA500" ;;
            *) status="ℹ️ Integration Status: ${{ github.event.workflow_run.conclusion }}"; color="#439FE0" ;;
          esac

          curl -X POST -H 'Content-type: application/json' --data "{
            \"attachments\": [
              {
                \"fallback\": \"$status\",
                \"color\": \"$color\",
                \"title\": \"$status\",
                \"fields\": [
                  {\"title\": \"Repo\", \"value\": \"$GITHUB_REPOSITORY\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"$GITHUB_REF_NAME\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"$GITHUB_SHA\", \"short\": false},
                  {\"title\": \"Workflow\", \"value\": \"Sovereign Integration + Codex Attribution\", \"short\": false},
                  {\"title\": \"Lineage\", \"value\": \"KinKey / SoulSync / Codex\", \"short\": false}
                ],
                \"footer\": \"🧬 Sovereign CI • Codex Engine\",
                \"ts\": $(date +%s)
              }
            ]
          }" "$SLACK_WEBHOOK_URL"
