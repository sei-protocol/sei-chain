name: Forge test

on:
  pull_request:
  push:
    branches:
      - main
      - evm
      - release/**

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly  # You may also pin to a stable tag if desired

      - name: Install dependencies
        run: forge install  # ✅ Ensure OpenZeppelin gets installed into lib/

      - name: Run Forge build
        run: |
          forge --version
          forge build --evm-version=prague
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv --evm-version=prague
        id: test
