name: Forge test

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - release/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      # See: https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pin to stable for predictable CI. If tests fail after a Foundry update,
          # either fix compatibility or pin to a specific version (e.g., 1.5.1).
          # See:
          #  - https://github.com/foundry-rs/foundry/releases
          #  - https://github.com/foundry-rs/foundry-toolchain
          version: stable

      - name: Run Forge build
        run: |
          forge --version
          forge build --evm-version=prague
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv --evm-version=prague
        id: test