name: Cross-Architecture Build Test

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - release/**

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'push' && github.sha || github.ref }}

env:
  LEDGER_ENABLED: false

jobs:
  linux-amd64:
    name: "Linux AMD64"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Verify Go installation
        run: |
          go version
          echo "GOARCH: $(go env GOARCH)"
          echo "GOOS: $(go env GOOS)"

      - name: Download Go dependencies
        run: go mod download

      - name: Run make install
        run: make install

      - name: Verify install binary
        run: seid version --long

      - name: Run make build
        run: make build

      - name: Verify build binary
        run: ./build/seid version --long
  linux-amd64-static:
    name: "Linux AMD64 (static)"
    runs-on: ubuntu-latest
    # The static seid is a release artefact, so only build it for release work,
    # not on every PR: PRs into release/**, pushes to release/**, or merge-queue
    # entries targeting release/**.
    # TODO(PLT-41): the github.head_ref clause runs it on this PR
    # (monty/release-binaries) for pre-merge testing — REMOVE before merging.
    if: >-
      github.head_ref == 'monty/release-binaries' ||
      startsWith(github.base_ref, 'release/') ||
      startsWith(github.ref, 'refs/heads/release/') ||
      startsWith(github.event.merge_group.base_ref, 'refs/heads/release/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'

      # Ubuntu's musl-gcc wrapper can't fully static-link on 24.04 (glibc's libgcc
      # pulls in _dl_find_object, which musl lacks). Use zig as a musl cross-compiler
      # (it ships its own musl compiler-rt) via the same script the release prebuild
      # runs, so this guard and the goreleaser release build identically.
      - name: Set up Zig musl cross-compiler
        run: bash scripts/setup-zig-cc.sh

      - name: Build statically (musl via zig cc)
        run: |
          # Pass the static-link flags via LDFLAGS rather than LINK_STATICALLY: the
          # Makefile's LINK_STATICALLY branch hard-codes `-z muldefs`, which zig cc
          # (lld) rejects. --allow-multiple-definition is the lld/GNU-ld synonym and
          # has the same effect (the libwasmvm base/v152/v155 archives redefine
          # overlapping symbols). Keeps the shared Makefile untouched.
          CC=zcc BUILD_TAGS=muslc LEDGER_ENABLED=false \
            LDFLAGS='-linkmode=external -extldflags "-Wl,--allow-multiple-definition -static"' \
            make build

      - name: Assert binary is statically linked
        run: |
          info=$(file ./build/seid)
          echo "$info"
          echo "$info" | grep -q "statically linked" \
            || { echo "ERROR: seid is not statically linked"; exit 1; }

      - name: Assert no dynamic dependencies
        run: |
          # On a true static binary, ldd reports "not a dynamic executable".
          ldd ./build/seid 2>&1 | grep -qE "not a dynamic|statically linked" \
            || { echo "ERROR: seid has dynamic dependencies:"; ldd ./build/seid; exit 1; }

      - name: Smoke test
        run: ./build/seid version --long

      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v5
        with:
          name: seid-linux-amd64-static
          path: ./build/seid
          retention-days: 14
  macos-arm64:
    name: "macOS ARM64"
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'

      - name: Install system dependencies
        run: |
          xcode-select --version || xcode-select --install

      - name: Verify Go installation
        run: |
          go version
          echo "GOARCH: $(go env GOARCH)"
          echo "GOOS: $(go env GOOS)"

      - name: Download Go dependencies
        run: go mod download

      - name: Run make install
        run: make install

      - name: Verify install binary
        run: seid version --long

      - name: Run make build
        run: make build

      - name: Verify build binary
        run: ./build/seid version --long
