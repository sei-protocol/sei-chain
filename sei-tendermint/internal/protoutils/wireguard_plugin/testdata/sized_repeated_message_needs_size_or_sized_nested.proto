syntax = "proto3";

package wireguardplugin.invalid;

import "wireguard/wireguard.proto";

option go_package = "github.com/example/wireguardplugin/invalid";

message UnsizedRepeatedInner {
  repeated int32 xs = 1 [(wireguard.max_count) = 2];
}

message SizedRepeatedMessageNeedsSizeOrSizedNested {
  option (wireguard.sized) = true;

  repeated UnsizedRepeatedInner inners = 1 [(wireguard.max_count) = 2];
}
