syntax = "proto3";

package protoutils;

option go_package = "github.com/sei-protocol/sei-chain/sei-tendermint/internal/protoutils/pb";

message TestonlyMsg {
  string string_value = 1;
  repeated string repeated_value = 2;
  map<string, string> map_value = 3;
  repeated TestonlyChild repeated_message_value = 4;
  map<string, TestonlyChild> map_message_value = 5;
}

message TestonlyChild {
  string value = 1;
}
