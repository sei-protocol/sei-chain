syntax = "proto3";

package autobahn;

import "hashable/hashable.proto";
import "wireguard/wireguard.proto";

option go_package = "github.com/sei-protocol/sei-chain/sei-tendermint/internal/autobahn/pb";

// Timestamp represented as seconds + nanoseconds since UNIX epoch.
// Equivalent of `google.protobuf.Timestamp` but supports canonical encoding.
// See `google.protobuf.Timestamp` for more detailed specification.
message Timestamp {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;

  // Represents seconds of UTC time since Unix epoch
  // 1970-01-01T00:00:00Z. Must be from 0001-01-01T00:00:00Z to
  // 9999-12-31T23:59:59Z inclusive.
  optional int64 seconds = 1; // required

  // Non-negative fractions of a second at nanosecond resolution. Negative
  // second values with fractions must still have non-negative nanos values
  // that count forward in time. Must be from 0 to 999,999,999
  // inclusive.
  optional int32 nanos = 2; // required
}

message Duration {
  option (hashable.hashable) = true;
  optional int64 seconds = 1; // required
  optional int32 nanos = 2; // required
}

message TransactionTimestamps {
  int64 created_at = 1;
  int64 received_at = 2;
}

message TransactionHeader {
  map<string, string> properties = 1;
  string edge_node = 2;
  TransactionTimestamps timestamps = 4;
}

message Transaction {
  string hash = 1;
  bytes payload = 2;
  uint64 gas_used = 3;
  TransactionHeader header = 4;
}

message TransactionResp {
  string hash = 1;
  bool success = 2;
  string message = 3;
}

message PublicKey {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional bytes ed25519 = 1 [(wireguard.max_size) = 32]; // required
}

message Signature {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional PublicKey key = 1; // required
  optional bytes sig = 2 [(wireguard.max_size) = 64]; // required
}

message BlockHeader {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional PublicKey lane = 1; // required
  optional uint64 block_number = 2; // required
  optional bytes parent_hash = 3 [(wireguard.max_size) = 32]; // required
  optional bytes payload_hash = 4 [(wireguard.max_size) = 32]; // required
}

message Payload {
  reserved "total_gas", "edge_count", "coinbase", "basefee";
  reserved 2, 3, 4, 5;
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional Timestamp created_at = 1; // required
  optional uint64 total_gas_wanted = 7; // required
  optional uint64 total_gas_estimated = 8; // required
  repeated bytes txs = 6 [
    (wireguard.max_count) = 2000,
    (wireguard.max_total_size) = 2048000
  ];
}

message Block {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional BlockHeader header = 1; // required
  optional Payload payload = 2; // required
}

message LaneQC {
  option (wireguard.sized) = true;
  BlockHeader vote = 1;
  repeated Signature sigs = 2 [(wireguard.max_count) = 100];
  optional uint64 epoch_index = 3;
}

message LaneRange {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional PublicKey lane = 1; // required
  optional uint64 first = 2; // required
  optional uint64 next = 3; // required
  optional bytes last_hash = 4 [(wireguard.max_size) = 32]; // required
}

message View {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional uint64 index = 1; // required
  optional uint64 number = 2; // required
}

message Proposal {
  reserved 2;
  reserved "created_at";
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional View view = 1; // required.
  optional Timestamp timestamp = 5; // required
  repeated LaneRange lane_ranges = 3 [(wireguard.max_count) = 100]; // Sorted by lane.
  optional AppProposal app = 4; // optional
  optional uint64 first_block = 6; // genesis InitialHeight; added to lane block numbers to produce absolute global block numbers
  optional uint64 epoch_index = 7; // epoch this proposal belongs to
}

message FullProposal {
  reserved "proposal";
  reserved 1;
  option (wireguard.sized) = true;
  SignedProposal proposal_v2 = 5;
  repeated LaneQC lane_qcs = 2 [(wireguard.max_count) = 100];
  optional AppQC app_qc = 3;
  optional TimeoutQC timeout_qc = 4; // justifies the proposal.
}

message PrepareQC {
  option (wireguard.sized) = true;
  Proposal vote = 1;
  repeated Signature sigs = 2 [(wireguard.max_count) = 100];
}

message CommitQC {
  option (wireguard.sized) = true;
  Proposal vote = 1;
  repeated Signature sigs = 3 [(wireguard.max_count) = 100];
}

message FullCommitQC {
  option (wireguard.sized) = true;
  CommitQC qc = 1;
  repeated BlockHeader headers = 2 [(wireguard.max_count) = 1000];
}

message TimeoutVote {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  optional View view = 1; // required
  optional uint64 latest_prepare_qc_view_number = 2; // optional
  optional uint64 epoch_index = 3; // epoch this vote belongs to
}

message TimeoutQC {
  option (wireguard.sized) = true;
  reserved "votes";
  reserved 1;
  repeated SignedTimeoutVote votes_v2 = 3 [(wireguard.max_count) = 100];
  optional PrepareQC latest_prepare_qc = 2;
}

message FullTimeoutVote {
  reserved "vote";
  reserved 1;
  option (wireguard.sized) = true;
  SignedTimeoutVote vote_v2 = 3;
  optional PrepareQC latest_prepare_qc = 2;
}

// Persisted consensus state (for crash recovery).
// Only persist votes and QCs here - these are the canonical consensus artifacts.
// Do NOT persist internal derived fields (e.g., cached computations, runtime state).
// Derived fields are implementation-dependent and should be recomputed on load.
message PersistedInner {
  reserved "commit_vote", "prepare_vote";
  reserved 4, 5;
  optional CommitQC commit_qc = 1;
  optional PrepareQC prepare_qc = 2;
  optional TimeoutQC timeout_qc = 3;

  optional SignedProposal commit_vote_v2 = 7;
  optional SignedProposal prepare_vote_v2 = 8;
  optional FullTimeoutVote timeout_vote = 6;
}

// Persisted availability prune anchor (AppQC + matching CommitQC pair).
// Stored atomically in an A/B file; used as the crash-recovery pruning watermark.
message PersistedAvailPruneAnchor {
  optional AppQC app_qc = 1;
  optional CommitQC commit_qc = 2;
}

message AppQC {
  option (wireguard.sized) = true;
  AppProposal vote = 1;
  repeated Signature sigs = 2 [(wireguard.max_count) = 100];
}

message AppProposal {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  // Global block number.
  optional uint64 global_number = 1; // required
  // Index of the commit qc finalizing the block.
  optional uint64 road_index = 2; // required
  // App hash at that block.
  optional bytes app_hash = 3 [(wireguard.max_size) = 32]; // required
  // Epoch this proposal belongs to.
  optional uint64 epoch_index = 4;
}

// This is the signable message.
// To sign ConsensusMsg/BlockMsg, you need to embed it in Msg first.
message Msg {
  option (hashable.hashable) = true;
  option (wireguard.sized) = true;
  oneof t { // required
    // Lane
    Block lane_proposal = 1;
    BlockHeader lane_vote = 2;

    // Consensus
    Proposal proposal = 3;
    Proposal prepare_vote = 4;
    Proposal commit_vote = 5;
    TimeoutVote timeout_vote = 6;

    // App
    AppProposal app_vote = 7;
  }
}

message SignedProposal {
  option (wireguard.sized) = true;
  Proposal msg = 1;
  Signature sig = 2;
}

message SignedTimeoutVote {
  option (wireguard.sized) = true;
  TimeoutVote msg = 1;
  Signature sig = 2;
}

message SignedAppVote {
  option (wireguard.sized) = true;
  AppProposal msg = 1;
  Signature sig = 2;
}

message SignedBlock {
  option (wireguard.sized) = true;
  Block msg = 1;
  Signature sig = 2;
}

message SignedBlockHeader {
  option (wireguard.sized) = true;
  BlockHeader msg = 1;
  Signature sig = 2;
}

message SignedAppProposal {
  option (wireguard.sized) = true;
  AppProposal msg = 1;
  Signature sig = 2;
}

// TODO(gprusak): rename to ConsensusMsg
message ConsensusReq {
  reserved "prepare_vote", "commit_vote";
  reserved 2, 3;
  option (wireguard.sized) = true;
  oneof t {
    FullProposal proposal = 1;
    SignedProposal prepare_vote_v2 = 6;
    SignedProposal commit_vote_v2 = 7;
    FullTimeoutVote timeout_vote = 4;
    TimeoutQC timeout_qc = 5;
  }
}
